[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "automedia"
version = "0.1.0"
description = "Automated media production pipeline"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9",
    "pydantic>=2",
    "pyyaml>=6",
]

[project.optional-dependencies]
openai = ["openai>=1"]
anthropic = ["anthropic>=0.30"]
httpx = ["httpx>=0.27"]
rich = ["rich>=13"]

[project.entry-points.console_scripts]
automedia = "automedia.cli.app:app"

[tool.setuptools.packages.find]
include = ["automedia*"]
