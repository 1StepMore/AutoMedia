site_name: AutoMedia
site_description: Automated media production pipeline documentation
site_url: https://1stepmore.github.io/automedia
repo_url: https://github.com/1stepmore/automedia
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - content.code.copy
  palette:
    primary: indigo

plugins:
  - search
  - awesome-pages

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/1stepmore/automedia

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Developer Guide: developer-guide.md
  - Core Concepts:
    - HITL Framework: hitl-framework.md
    - Omni Triad Integration: omni-integration.md
    - Asset Library: asset-library.md
  - API & CLI:
    - API Reference: api-reference.md
    - CLI Reference: cli-reference.md
    - MCP Setup: mcp-setup.md
  - Architecture:
    - Open-Core Model: open-core.md
  - Verification:
    - Production E2E Test Design: production-e2e-test-design.md
  - Runbook:
    - Gate Failure Modes: runbook/gate-failure-modes.md
    - Production Workflow: runbook/production-workflow.md
    - Cron Troubleshooting: runbook/cron-troubleshooting.md
    - API Gotchas: runbook/api-gotchas.md
