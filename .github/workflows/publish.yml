# Publish AutoMedia to PyPI using Trusted Publishing (OIDC)
#
# Prerequisites — one-time manual setup at PyPI:
#   1. Create the project at https://pypi.org/manage/project/automedia-pipeline/settings/
#   2. Under "Publishing" → "Add a new publisher":
#      - Owner: 1stepmore
#      - Repository: automedia
#      - Workflow: publish.yml
#      - Environment: pypi  (must match the environment below)
#   3. Repeat at https://test.pypi.org for the TestPyPI trusted publisher
#      (environment: testpypi)
#
# Once configured, uncomment the "Publish to PyPI" step and remove the
# TestPyPI dry-run step. No API tokens or secrets are needed — the OIDC
# exchange handles authentication automatically.

name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (dry-run safety)
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # Required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
#   To enable production PyPI publishing:
#   1. Set up Trusted Publisher at https://pypi.org/manage/project/automedia-pipeline/settings/
  #   2. Create a GitHub environment named "pypi" in repo settings
  #   3. Uncomment the job below and remove the testpypi job above
