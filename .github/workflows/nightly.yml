name: Nightly

on:
  schedule:
    # Every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read

jobs:
  full-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      # ── Security scans (blocking — unlike PR CI where these are advisory) ──

      - name: Security scan (pip-audit)
        run: |
          uv pip install pip-audit
          uv run pip-audit

      - name: Security scan (bandit)
        run: |
          uv pip install bandit
          uv run bandit -r src/automedia/ -ll

      - name: Safety check (vulnerability database)
        continue-on-error: true
        run: |
          uv pip install safety
          uv run safety check --full-report

      - name: IaC scan (checkov)
        run: |
          uv pip install checkov
          uv run checkov -d . --quiet --soft-fail

      - name: Container scan (trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH

      # ── Lint & type checks ──

      - name: Ruff
        run: uv run ruff check src/automedia/ --ignore E501,E402,N806,E741

      - name: Mypy
        run: uv run mypy src/automedia/ --ignore-missing-imports

      # ── Full test suite ──

      - name: Pytest (full suite)
        run: |
          uv run pytest \
            --cov=src/automedia \
            --cov-branch \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -q --tb=short

      # ── Artifacts ──

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 30

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 30
