name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/automedia/ --ignore E501,E402,N806,E741
      - name: Dead code detection (vulture)
        continue-on-error: true
        run: vulture src/automedia/ --min-confidence 80
      - name: Mypy
        run: mypy src/automedia/ --ignore-missing-imports
      - name: Actionlint (workflow validation)
        uses: reviewdog/action-actionlint@v1
        with:
          level: warning
      - name: Check unused dependencies
        continue-on-error: true
        run: |
          pip install deptry
          deptry src/automedia/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: ~/.cache/pytest
          key: pytest-${{ runner.os }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Security scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --fail-on CRITICAL
      - name: Security scan (bandit)
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r src/automedia/ -ll
      - name: Pytest
        continue-on-error: ${{ matrix.python-version != '3.11' }}
        run: python3 -m pytest --cov=src/automedia --cov-branch --cov-report=xml --cov-report=term-missing --cov-fail-under=75 -q --tb=short

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          quiet: true
          soft_fail: false
          skip_check: CKV_DOCKER_2
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image for scanning
        run: docker build -t automedia:scan .
      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: automedia:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
